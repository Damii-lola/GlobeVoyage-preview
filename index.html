<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GlobeVoyage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #0a0a0a; color: #f0ede6; min-height: 100vh; }
    header { padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    header h1 { font-size: 1.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; }
    main { padding: 4rem; }
    h2 { font-size: 2.5rem; margin-bottom: 2rem; font-weight: 400; }
    #destinations { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .card { background: #141414; border: 1px solid #222; border-radius: 4px; overflow: hidden; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .card img { width: 100%; height: 180px; object-fit: cover; background: #222; }
    .card-body { padding: 1.2rem; }
    .card-body h3 { font-size: 1.2rem; color: #c9a96e; margin-bottom: 0.3rem; }
    .card-body p { font-size: 0.85rem; color: #888; line-height: 1.5; }
    .card-body .price { margin-top: 0.8rem; font-size: 1rem; color: #f0ede6; }
    #status { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>GlobeVoyage</h1>
    <span>Explore the World</span>
  </header>
  <main>
    <h2>Featured Destinations</h2>
    <p id="status">Loading destinations...</p>
    <div id="destinations"></div>
  </main>

  <script>
    // Point this to your Render backend URL
    const API_URL = "https://globevoyage-admin.onrender.com";

    async function loadDestinations() {
      try {
        const res = await fetch(`${API_URL}/api/destinations`);
        const destinations = await res.json();

        const status = document.getElementById("status");
        const grid = document.getElementById("destinations");
        status.textContent = "";

        if (!destinations.length) {
          status.textContent = "No destinations yet.";
          return;
        }

        destinations.forEach(dest => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            ${dest.image_url ? `<img src="${dest.image_url}" alt="${dest.name}" />` : `<div style="height:180px;background:#1a1a1a;"></div>`}
            <div class="card-body">
              <h3>${dest.name}</h3>
              <p>${dest.country}</p>
              <p>${dest.description || ""}</p>
              ${dest.price ? `<p class="price">From $${dest.price}</p>` : ""}
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        document.getElementById("status").textContent = "Could not connect to API.";
        console.error(err);
      }
    }

    loadDestinations();
  </script>
</body>
</html>
