<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlobeVoyage — Mission Control Login</title>
<style>
:root{
  --bg:#05080f;--bg2:#080d18;--border:#1a2540;
  --accent:#2a7fff;--accent2:#00e5ff;--red:#ff3d57;
  --text:#c8dcf5;--text2:#6a8aac;--text3:#3a5a7a;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100vh;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 40%,rgba(42,127,255,0.07) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 70%,rgba(0,229,255,0.04) 0%,transparent 50%);
  pointer-events:none;
}
.card{
  position:relative;z-index:1;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px;
  width:100%;max-width:380px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
.logo{
  display:flex;align-items:center;gap:12px;
  justify-content:center;margin-bottom:32px;
}
.logo-icon{
  width:36px;height:36px;border-radius:50%;
  background:conic-gradient(var(--accent),var(--accent2),var(--accent));
  animation:spin 8s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-size:15px;letter-spacing:3px;color:#fff;font-weight:700}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:4px;margin-top:1px}
h1{
  font-size:20px;font-weight:700;color:#fff;
  text-align:center;margin-bottom:6px;
}
.subtitle{
  font-size:11px;color:var(--text3);letter-spacing:2px;
  text-align:center;text-transform:uppercase;margin-bottom:28px;
}
.field{margin-bottom:16px}
label{
  display:block;font-size:10px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:8px;
}
input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s;
}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.error{
  display:none;
  background:rgba(255,61,87,.08);
  border:1px solid rgba(255,61,87,.2);
  border-radius:8px;padding:10px 14px;
  font-size:12px;color:var(--red);
  margin-bottom:16px;text-align:center;
}
.error.show{display:block}
button{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#1040cc);
  color:#fff;font-size:14px;font-weight:600;
  letter-spacing:1px;cursor:pointer;
  box-shadow:0 4px 20px rgba(42,114,255,0.35);
  transition:opacity .15s,transform .12s;
  margin-top:4px;
}
button:hover{opacity:0.9}
button:active{transform:scale(0.98)}
button:disabled{opacity:0.5;cursor:not-allowed}
.lock{
  text-align:center;margin-top:20px;
  font-size:10px;color:var(--text3);
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"></div>
    <div>
      <div class="logo-text">GLOBEVOYAGE</div>
      <div class="logo-sub">MISSION CONTROL</div>
    </div>
  </div>

  <h1>Restricted Access</h1>
  <p class="subtitle">Administrator Login Required</p>

  <div class="error" id="err">Incorrect username or password</div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="usr" placeholder="Enter username" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button id="btn" onclick="login()">Enter Mission Control</button>

  <div class="lock">🔒 Secured · No public access</div>
</div>

<script>
// ── Redirect if already logged in ────────────────────────────────
if (sessionStorage.getItem('gv_auth')) {
  window.location.href = 'admin_control';
}

// ── Allow Enter key to submit ─────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

// ── Login — calls the Render backend /api/auth/verify directly ────
// This endpoint reads ADMIN_USERNAME and ADMIN_PASSWORD from env vars
// and returns { ok: true, user } on success or 401 on failure.
// We never call /admin_control for auth — that was the old broken approach.
async function login() {
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  if (!usr || !pwd) {
    err.textContent = 'Please enter both username and password';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifying...';
  err.classList.remove('show');

  try {
    const b64 = btoa(usr + ':' + pwd);

    const res = await fetch('https://globevoyage-admin.onrender.com/api/auth/verify', {
      method: 'POST',
      headers: {
        'Authorization': 'Basic ' + b64,
        'Content-Type': 'application/json',
      },
    });

    const data = await res.json();

    if (res.ok && data.ok) {
      // Store auth in sessionStorage — cleared when tab closes
      sessionStorage.setItem('gv_auth', b64);
      sessionStorage.setItem('gv_user', data.user || usr);
      // Go to the admin panel
      window.location.href = 'admin_control';
    } else {
      err.textContent = data.error || 'Incorrect username or password';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Enter Mission Control';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }

  } catch (e) {
    // Network error — Render backend may be cold-starting (can take ~30s)
    err.textContent = 'Could not reach server — it may be waking up, try again in 30s';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Enter Mission Control';
  }
}
</script>
</body>
</html>
